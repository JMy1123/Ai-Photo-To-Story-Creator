<!DOCTYPE html>
<html>
<head>
  <title>Image-to-Prompt Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      background: #111;
      color: #f5f5f5;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    select, input, button, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    textarea {
      height: 260px;
      background: #0b0b0b;
      color: white;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      max-width: 100%;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Image-to-Prompt Generator</h1>

<div class="box">
  <input type="file" id="imageInput" accept="image/*">

  <img id="preview" style="display:none;">

  <select id="style">
    <option value="descriptive">Descriptive</option>
    <option value="casual">Descriptive Casual</option>
    <option value="straightforward">Straightforward</option>
    <option value="stable_diffusion">Stable Diffusion Prompt</option>
    <option value="midjourney">MidJourney</option>
    <option value="e621">e621 Tag List</option>
  </select>

  <select id="length">
    <option value="any">Any</option>
    <option value="very_short">Very Short</option>
    <option value="short">Short</option>
    <option value="medium">Medium</option>
    <option value="long">Long</option>
    <option value="very_long">Very Long</option>
  </select>

  <input type="number" id="maxWords" placeholder="Optional max words">

  <button onclick="generatePrompt()">Generate Prompt</button>
</div>

<div class="box">
  <textarea id="output" placeholder="Generated prompt..."></textarea>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

async function generatePrompt() {
  const file = imageInput.files[0];

  if (!file) {
    alert("Upload an image first.");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("style", document.getElementById("style").value);
  formData.append("length", document.getElementById("length").value);

  const maxWords = document.getElementById("maxWords").value;
  if (maxWords) {
    formData.append("max_words", maxWords);
  }

  const output = document.getElementById("output");
  output.value = "Generating...";

  try {
    const response = await fetch("http://127.0.0.1:8000/generate", {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    output.value = data.prompt;
  } catch (err) {
    output.value = "Failed to connect to backend.";
  }
}
</script>

</body>
</html>
